<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solenergi CRM Pro</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f9; }
    </style>
    <style>
      @media print {
        body * { visibility: hidden; }
        #report-page-1, #report-page-1 *,
        #report-page-2, #report-page-2 *,
        #report-page-3, #report-page-3 * { visibility: visible; }
        #report-page-1 { position: fixed; top: 0; left: 0; }
        .no-print { display: none !important; }
        @page { size: A4; margin: 0; }
        #report-page-2 { page-break-before: always; }
        #report-page-3 { page-break-before: always; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
